name: CI React Vercel Cypress

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build React
    runs-on: ubuntu-latest

    steps:
      - name: Checkout React repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install React dependencies
        run: npm install

      - name: Build React app
        run: npm run build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build

    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}

    steps:
      - name: Checkout React repository
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout Cypress repository
        uses: actions/checkout@v4
        with:
          repository: domenico-chang/cypress15
          token: ${{ secrets.TOKEN_REPO }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cypress dependencies
        run: npm install

      - name: Install Cypress binary
        run: npx cypress install

      - name: Update Cypress baseUrl
        run: |
          node -e "
          const fs = require('fs');
          const path = 'cypress.config.js';
          let text = fs.readFileSync(path, 'utf8');
          text = text.replace(/baseUrl:\s*['\"].*?['\"]/, \"baseUrl: '${{ needs.deploy.outputs.preview_url }}'\");
          fs.writeFileSync(path, text);
          "

      - name: Run Cypress tests
        run: npx cypress run
